name: Deploy #Workflow name
on: #trigger
  workflow_dispatch:
  push:
    branches:
      - 'development'
      - 'release/**'
      - 'master'
      - "deploy-*"

permissions:
  contents: write
  pull-requests: write
  
env:
  GH_TOKEN: ${{ github.token }}
  APP_ENV: ${{ github.ref_name == 'master' && 'production' || contains(github.ref_name,'release/') && 'staging' || 'development' }}
jobs:
  main:
    runs-on: ['ubuntu-latest']
    environment:
      name: ${{ github.ref_name == 'master' && 'production' || contains(github.ref_name,'release/') && 'staging' || 'development' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Check github variables
        run: |
          echo "github.base_ref: ${{ github.base_ref }}"
          echo "github.head_ref: ${{ github.ref_name }}"

      - name: deploy-qa1 handle
        run: |
          case "${{ github.ref_name }}" in
            deploy-qa1) : "hk01-web-cn-qa1" ;;
            deploy-qa2) : "hk01-web-cn-qa2" ;;
            deploy-qa3) : "hk01-web-cn-qa3" ;;
            deploy-qa4) : "hk01-web-cn-qa4" ;;
            deploy-qa5) : "hk01-web-cn-qa5" ;;
            deploy-adv) : "hk01-web-cn-adv" ;;
            deploy-asj) : "hk01-web-cn-asj" ;;
            deploy-prod-adv) : "hk01-web-cn-adv" ;; # deploy to production cloud
            master-b)   : "hk01-web-cn-master-b" ;;
            *)          : "test-app-development" ;;
          esac
          echo "AWS_ECR_NAME="$_"" >> $GITHUB_ENV

      - name: Check github variables
        run: |
          echo "AWS_ECR_NAME: ${{ env.AWS_ECR_NAME }}"

